<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Sukuna vs Gojo</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; user-select: none; touch-action: none; }
body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
#gameContainer { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block; z-index: 1; }

/* ─── ANA MENÜ ─── */
#mainMenu {
  position: absolute; inset: 0; z-index: 300;
  background: radial-gradient(ellipse at 50% 30%, #1a0030 0%, #050008 60%, #000 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 0;
}
#menuTitle {
  font-size: clamp(28px,7vw,58px); font-weight: 900; letter-spacing: 4px;
  background: linear-gradient(135deg, #ff0050, #cc00ff, #00d4ff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  text-shadow: none; margin-bottom: 6px; text-align: center;
}
#menuSubtitle {
  color: rgba(255,255,255,0.45); font-size: 13px; letter-spacing: 6px;
  text-transform: uppercase; margin-bottom: 52px;
}
.menu-char-row {
  display: flex; gap: 60px; align-items: flex-end; margin-bottom: 44px;
}
.menu-char { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.menu-char canvas { width: 90px; height: 140px; border-radius: 12px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); }
.menu-char-name { font-size: 11px; letter-spacing: 3px; font-weight: 700; color: rgba(255,255,255,0.5); text-transform: uppercase; }
#btnPlay {
  padding: 16px 52px; background: linear-gradient(135deg, #cc00ff, #ff0050);
  color: #fff; border: none; border-radius: 40px;
  font-size: 20px; font-weight: 900; letter-spacing: 3px; cursor: pointer;
  touch-action: manipulation; box-shadow: 0 0 30px rgba(200,0,255,0.5);
  transition: transform 0.12s, box-shadow 0.12s; margin-bottom: 32px;
}
#btnPlay:active { transform: scale(0.95); box-shadow: 0 0 15px rgba(200,0,255,0.3); }
.credits {
  color: rgba(255,255,255,0.2); font-size: 11px; letter-spacing: 2px; text-align: center;
}
.credits span { color: rgba(200,0,255,0.7); font-weight: 700; }
.credits span.claude-name { color: rgba(0,212,255,0.7); }
.vs-badge {
  font-size: clamp(18px,5vw,38px); font-weight: 900; color: #fff;
  text-shadow: 0 0 20px #fff; align-self: center; margin-bottom: 10px;
  letter-spacing: 2px;
}

/* ─── JOYSTICK ─── */
#joystickBase {
  position: absolute;
  left: max(25px, env(safe-area-inset-left));
  bottom: max(25px, env(safe-area-inset-bottom));
  width: 90px; height: 90px;
  background: rgba(255,255,255,0.12);
  border: 2.5px solid rgba(255,255,255,0.45);
  border-radius: 50%; z-index: 100;
}
#joystickStick {
  position: absolute; width: 34px; height: 34px;
  background: rgba(255,255,255,0.75); border-radius: 50%;
  top: 28px; left: 28px; pointer-events: none;
  box-shadow: 0 0 8px rgba(255,255,255,0.4);
}

/* ─── BUTONLAR ─── */
.btn-group {
  position: absolute;
  right: max(16px, env(safe-area-inset-right));
  bottom: max(16px, env(safe-area-inset-bottom));
  display: grid;
  grid-template-columns: 72px 72px;
  grid-template-rows: 72px 72px;
  gap: 10px; z-index: 100;
}
.action-btn {
  width: 72px; height: 72px; border-radius: 50%;
  border: 2.5px solid rgba(255,255,255,0.65);
  background: rgba(0,0,0,0.65); color: white;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  font-size: 10px; font-weight: bold;
  text-align: center; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.action-btn:active { transform: scale(0.93); }
.disabled-btn { opacity: 0.3 !important; pointer-events: none !important; }

#btnHit     { border-color: #ff9500; color: #ff9500; grid-column: 2; grid-row: 2; box-shadow: 0 0 10px rgba(255,149,0,0.3); }
#btnDash    { border-color: #ffffff; color: #ffffff; grid-column: 1; grid-row: 2; }
#btnSpecial { border-color: #ff3b30; color: #ff3b30; grid-column: 1; grid-row: 1; }
#btnSkill   { border-color: #00d4ff; color: #00d4ff; grid-column: 2; grid-row: 1; box-shadow: 0 0 10px rgba(0,212,255,0.2); }

/* ─── OVERLAY ─── */
#gameOverlay {
  display: none; position: absolute; inset: 0;
  background: rgba(0,0,0,0.82); z-index: 200;
  flex-direction: column; justify-content: center; align-items: center; gap: 18px;
}
#gameOverlay.active { display: flex; }
#overlayTitle { font-size: 42px; font-weight: 900; letter-spacing: 2px; }
#overlayTitle.win  { color: #ffd700; text-shadow: 0 0 20px #ffd700; }
#overlayTitle.lose { color: #ff3b30; text-shadow: 0 0 20px #ff3b30; }
#overlaySubtitle { color: #ccc; font-size: 16px; }
.overlay-btn {
  padding: 14px 36px; border: none; border-radius: 30px;
  font-size: 16px; font-weight: 800; cursor: pointer; touch-action: manipulation;
}
#restartBtn { background: #ff9500; color: #000; }
#menuBtn    { background: rgba(255,255,255,0.12); color: #fff; border: 1.5px solid rgba(255,255,255,0.3); }
.overlay-btn:active { transform: scale(0.95); }

#phaseBanner {
  display: none; position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  color: #ff3b30; font-size: 28px; font-weight: 900; letter-spacing: 3px;
  text-shadow: 0 0 20px #ff0000; z-index: 150; pointer-events: none; white-space: nowrap;
}
</style>
</head>
<body>
<div id="gameContainer">

  <!-- ANA MENÜ -->
  <div id="mainMenu">
    <div id="menuTitle">SUKUNA vs GOJO</div>
    <div id="menuSubtitle">Boss Fight</div>
    <div class="menu-char-row">
      <div class="menu-char">
        <canvas id="previewSukuna" width="90" height="140"></canvas>
        <div class="menu-char-name">Sukuna</div>
      </div>
      <div class="vs-badge">VS</div>
      <div class="menu-char">
        <canvas id="previewGojo" width="90" height="140"></canvas>
        <div class="menu-char-name">Gojo</div>
      </div>
    </div>
    <button id="btnPlay">▶ OYNA</button>
    <div class="credits">Yapımcılar &nbsp;|&nbsp; <span>ImDuckmc</span> &amp; <span class="claude-name">Claude</span></div>
  </div>

  <!-- OYUN UI -->
  <div id="joystickBase" style="display:none"><div id="joystickStick"></div></div>
  <div class="btn-group" id="btnGroup" style="display:none">
    <div class="action-btn" id="btnSpecial">FUSE</div>
    <div class="action-btn disabled-btn" id="btnSkill">ALAN<br>GENİŞLETME</div>
    <div class="action-btn" id="btnDash">DASH</div>
    <div class="action-btn" id="btnHit">YUMRUK</div>
  </div>

  <canvas id="gameCanvas"></canvas>
  <div id="phaseBanner">⚠ FAZ 2 ⚠</div>
  <div id="gameOverlay">
    <div id="overlayTitle">KAZANDIN!</div>
    <div id="overlaySubtitle">Gojo yenildi!</div>
    <button class="overlay-btn" id="restartBtn">TEKRAR OYNA</button>
    <button class="overlay-btn" id="menuBtn">ANA MENÜ</button>
  </div>
</div>

<script>
(function(){
'use strict';

/* ── MENÜ PREVIEW ── */
function drawMenuSukuna() {
  const c = document.getElementById('previewSukuna');
  const x = c.getContext('2d');
  x.clearRect(0,0,90,140);
  x.save(); x.translate(45,90);
  x.fillStyle='#f5f5f7';
  x.beginPath(); x.moveTo(-13,-2); x.lineTo(13,-2); x.lineTo(11,48); x.lineTo(-11,48); x.closePath(); x.fill();
  x.fillStyle='#7a2240'; x.fillRect(-11,20,22,6);
  x.strokeStyle='#000'; x.lineWidth=4; x.lineCap='round';
  x.beginPath(); x.moveTo(-6,48); x.lineTo(-9,54); x.moveTo(6,48); x.lineTo(9,54); x.stroke();
  x.beginPath(); x.moveTo(-9,5); x.lineTo(-15,20); x.moveTo(9,5); x.lineTo(15,20); x.stroke();
  x.fillStyle='#fbe3da'; x.beginPath(); x.arc(0,-15,9,0,Math.PI*2); x.fill();
  x.strokeStyle='#000'; x.lineWidth=2.5; x.stroke();
  x.strokeStyle='#000'; x.lineWidth=1.5;
  x.beginPath(); x.moveTo(-4,-19); x.lineTo(4,-19); x.moveTo(-6,-12); x.lineTo(-2,-12); x.moveTo(2,-12); x.lineTo(6,-12); x.stroke();
  x.fillStyle='#e58cb0';
  x.beginPath(); x.moveTo(-9,-21); x.lineTo(-13,-29); x.lineTo(-6,-24); x.lineTo(-4,-34); x.lineTo(0,-25); x.lineTo(4,-35); x.lineTo(6,-24); x.lineTo(12,-28); x.lineTo(9,-21); x.closePath(); x.fill();
  x.restore();
}
function drawMenuGojo() {
  const c = document.getElementById('previewGojo');
  const x = c.getContext('2d');
  x.clearRect(0,0,90,140);
  x.save(); x.translate(45,90);
  x.fillStyle='#15151a'; x.fillRect(-12,-2,24,24);
  x.fillStyle='#d2cbd4';
  x.beginPath(); x.moveTo(-14,22); x.lineTo(14,22); x.lineTo(12,48); x.lineTo(2,48); x.lineTo(0,28); x.lineTo(-2,48); x.lineTo(-12,48); x.closePath(); x.fill();
  x.fillStyle='#0a0a0f'; x.fillRect(-13,19,26,4);
  x.strokeStyle='#000'; x.lineWidth=3;
  x.beginPath(); x.moveTo(-6,48); x.lineTo(-8,53); x.moveTo(6,48); x.lineTo(8,53); x.stroke();
  x.strokeStyle='#15151a'; x.lineWidth=4.5;
  x.beginPath(); x.moveTo(-12,3); x.lineTo(-18,12); x.moveTo(12,3); x.lineTo(18,12); x.stroke();
  x.strokeStyle='#fdf0ed'; x.lineWidth=3.5;
  x.beginPath(); x.moveTo(-18,12); x.lineTo(-16,24); x.moveTo(18,12); x.lineTo(16,24); x.stroke();
  x.fillStyle='#fdf0ed'; x.beginPath(); x.arc(0,-14,9,0,Math.PI*2); x.fill();
  x.strokeStyle='#000'; x.lineWidth=2; x.stroke();
  x.fillStyle='#00d4ff'; x.shadowColor='#00d4ff'; x.shadowBlur=5;
  x.beginPath(); x.arc(4,-13,2.5,0,Math.PI*2); x.fill(); x.shadowBlur=0;
  x.fillStyle='#fff';
  x.beginPath(); x.moveTo(-9,-20); x.lineTo(-13,-30); x.lineTo(-5,-25); x.lineTo(-2,-35); x.lineTo(2,-26); x.lineTo(6,-36); x.lineTo(8,-25); x.lineTo(13,-29); x.lineTo(9,-20); x.closePath(); x.fill();
  x.restore();
}
drawMenuSukuna(); drawMenuGojo();

/* ── CANVAS ── */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const joystickBase = document.getElementById('joystickBase');
const stick = document.getElementById('joystickStick');
const btnGroup = document.getElementById('btnGroup');
const btnHit = document.getElementById('btnHit');
const btnDash = document.getElementById('btnDash');
const btnSkill = document.getElementById('btnSkill');
const btnSpecial = document.getElementById('btnSpecial');
const gameOverlay = document.getElementById('gameOverlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlaySubtitle = document.getElementById('overlaySubtitle');
const restartBtn = document.getElementById('restartBtn');
const menuBtn = document.getElementById('menuBtn');
const phaseBanner = document.getElementById('phaseBanner');
const mainMenu = document.getElementById('mainMenu');

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);

/* ── STATE ── */
let domainActive=false, gojoDomainActive=false, frozenTimer=0;
let domainTimer=0, domainCuts=[], domainDamageTicker=0;
let specialCooldown=0, cleaveCooldown=0, flameCooldown=0;
let comboCount=0, comboResetTimer=0, bossPhase=1;
let gameOver=false, gameRunning=false;
let floatingTexts=[], particles=[], animFrame=null, lastTime=0, arenaObjects=[];
let gojoRedSlashes=[], gojoBlueAura=[], gojoPurpleBeam=null;
let cleaveEffect=null, flameWave=null;

// Ekstra butonlar (dinamik)
let btnCleave=null, btnFlame=null;

const player={}, target={};

function createExtraButtons() {
  // Temizle
  if(btnCleave){ btnCleave.remove(); btnCleave=null; }
  if(btnFlame){ btnFlame.remove(); btnFlame=null; }

  btnCleave = document.createElement('div');
  btnCleave.className='action-btn';
  btnCleave.id='btnCleave';
  btnCleave.innerHTML='CLEAVE<br><span style="font-size:9px">🗡️</span>';
  Object.assign(btnCleave.style, {
    borderColor:'#cc00ff', color:'#cc00ff',
    boxShadow:'0 0 12px rgba(200,0,255,0.4)',
    position:'absolute',
    right:'max(170px, calc(env(safe-area-inset-right) + 154px))',
    bottom:'max(16px, env(safe-area-inset-bottom))',
    zIndex:'100'
  });
  document.getElementById('gameContainer').appendChild(btnCleave);
  addBtn(btnCleave, cleaveAction);

  btnFlame = document.createElement('div');
  btnFlame.className='action-btn';
  btnFlame.id='btnFlame';
  btnFlame.innerHTML='ATEŞ<br><span style="font-size:9px">🔥</span>';
  Object.assign(btnFlame.style, {
    borderColor:'#ff6a00', color:'#ff6a00',
    boxShadow:'0 0 12px rgba(255,100,0,0.4)',
    position:'absolute',
    right:'max(170px, calc(env(safe-area-inset-right) + 154px))',
    bottom:'max(98px, calc(env(safe-area-inset-bottom) + 82px))',
    zIndex:'100'
  });
  document.getElementById('gameContainer').appendChild(btnFlame);
  addBtn(btnFlame, flameAction);
}

function removeExtraButtons() {
  if(btnCleave){ btnCleave.remove(); btnCleave=null; }
  if(btnFlame){ btnFlame.remove(); btnFlame=null; }
}

/* ── INIT GAME ── */
function initGame() {
  domainActive=false; gojoDomainActive=false; frozenTimer=0;
  domainTimer=0; domainCuts=[]; domainDamageTicker=0;
  specialCooldown=0; cleaveCooldown=0; flameCooldown=0;
  comboCount=0; comboResetTimer=0; bossPhase=1;
  gameOver=false; gameRunning=true;
  floatingTexts=[]; particles=[];
  gojoRedSlashes=[]; gojoBlueAura=[]; gojoPurpleBeam=null;
  cleaveEffect=null; flameWave=null;

  Object.assign(player,{
    x:window.innerWidth*0.75, y:window.innerHeight*0.5,
    radius:18, speed:4, vx:0, vy:0,
    hp:500, maxHp:500, energy:0, maxEnergy:100,
    isDashing:false, dashTimer:0, dashSpeed:14, dashCooldown:0,
    hitCooldown:false, skillCooldown:0,
    lastDirectionX:-1, lastDirectionY:0,
    state:'idle', facing:'left',
    hairColor:'#e58cb0', clothesColor:'#f5f5f7',
    obiColor:'#7a2240', tattooColor:'#000000'
  });

  Object.assign(target,{
    x:window.innerWidth*0.25, y:window.innerHeight*0.5,
    radius:25, hp:2500, maxHp:2500,
    vx:0, vy:0, friction:0.85,
    stunTimer:0, actionCooldown:0, energy:0,
    phase2announced:false,
    dashCooldown:0, redSlashCooldown:0, blueAuraCooldown:0, purpleBeamCooldown:0,
    isDashing:false, dashTimer:0, dashVx:0, dashVy:0,
    strategyTimer:0, strategy:'chase'
  });

  arenaObjects=[];
  for(let i=0;i<15;i++) arenaObjects.push({
    x:Math.random()*window.innerWidth,
    y:Math.random()*window.innerHeight,
    r:30+Math.random()*40
  });

  btnSkill.classList.add('disabled-btn');
  btnSkill.innerHTML='ALAN<br>GENİŞLETME';
  gameOverlay.classList.remove('active');
  phaseBanner.style.display='none';
  mainMenu.style.display='none';
  joystickBase.style.display='';
  btnGroup.style.display='';
  createExtraButtons();

  if(animFrame) cancelAnimationFrame(animFrame);
  lastTime=performance.now();
  animFrame=requestAnimationFrame(loop);
}

function showMainMenu() {
  gameRunning=false;
  if(animFrame){ cancelAnimationFrame(animFrame); animFrame=null; }
  gameOverlay.classList.remove('active');
  joystickBase.style.display='none';
  btnGroup.style.display='none';
  removeExtraButtons();
  ctx.clearRect(0,0,canvas.width,canvas.height);
  mainMenu.style.display='flex';
}

/* ── GOJO AI ── */
function updateAI() {
  if(gameOver) return;
  const dx=player.x-target.x, dy=player.y-target.y;
  const dist=Math.hypot(dx,dy);
  const phase=bossPhase;
  if(target.dashCooldown>0) target.dashCooldown--;
  if(target.redSlashCooldown>0) target.redSlashCooldown--;
  if(target.blueAuraCooldown>0) target.blueAuraCooldown--;
  if(target.purpleBeamCooldown>0) target.purpleBeamCooldown--;
  if(target.actionCooldown>0) target.actionCooldown--;
  if(target.strategyTimer>0) target.strategyTimer--;
  if(target.stunTimer>0){ target.stunTimer--; return; }
  if(domainActive||gojoDomainActive) return;

  if(target.strategyTimer<=0){
    const roll=Math.random();
    if(dist>300) target.strategy=roll<0.6?'chase':'ranged';
    else if(dist>100) target.strategy=phase===2?(roll<0.5?'chase':roll<0.75?'strafe':'ranged'):(roll<0.4?'chase':roll<0.7?'strafe':'ranged');
    else target.strategy=roll<0.55?'attack':roll<0.8?'retreat':'strafe';
    target.strategyTimer=phase===2?(30+Math.random()*40):(50+Math.random()*60);
  }

  const baseSpeed=phase===2?0.8:0.5;

  // AI Dash
  if(!target.isDashing&&target.dashCooldown<=0){
    const should=(dist>200&&Math.random()<(phase===2?0.06:0.03))||(dist<120&&Math.random()<(phase===2?0.04:0.02))||(target.hp<target.maxHp*0.3&&Math.random()<0.05);
    if(should){
      const retreating=dist<80&&Math.random()<0.4;
      const angle=retreating?Math.atan2(-dy,-dx):Math.atan2(dy,dx)+(Math.random()-0.5)*0.6;
      target.isDashing=true; target.dashTimer=10;
      target.dashVx=Math.cos(angle)*16; target.dashVy=Math.sin(angle)*16;
      target.dashCooldown=phase===2?55:80;
      spawnParticles(target.x,target.y,retreating?'#0099ff':'#cc00ff',8);
    }
  }

  if(target.isDashing){
    target.vx=target.dashVx; target.vy=target.dashVy;
    target.dashTimer--;
    if(target.dashTimer<=0) target.isDashing=false;
  } else {
    if(target.strategy==='chase'||target.strategy==='attack'){
      target.vx+=(dx/dist)*baseSpeed; target.vy+=(dy/dist)*baseSpeed;
    } else if(target.strategy==='strafe'){
      const px=-dy/dist, py=dx/dist, side=Math.sin(Date.now()*0.002)>0?1:-1;
      target.vx+=px*side*baseSpeed*1.2; target.vy+=py*side*baseSpeed*1.2;
      if(dist>150){ target.vx+=(dx/dist)*baseSpeed*0.4; target.vy+=(dy/dist)*baseSpeed*0.4; }
    } else if(target.strategy==='retreat'){
      target.vx-=(dx/dist)*baseSpeed*1.5; target.vy-=(dy/dist)*baseSpeed*1.5;
    } else if(target.strategy==='ranged'){
      if(dist<180){ target.vx-=(dx/dist)*baseSpeed; target.vy-=(dy/dist)*baseSpeed; }
    }
  }

  if(dist<50&&target.actionCooldown<=0){
    const dmg=phase===2?18:12;
    player.hp-=dmg;
    spawnParticles(player.x,player.y,'#ff3b30',6);
    addFloatingText(player.x,player.y-20,`-${dmg}`,'#ff3b30');
    target.vx=-(dx/dist)*18; target.vy=-(dy/dist)*18;
    target.actionCooldown=phase===2?22:35;
    target.energy=Math.min(100,target.energy+12);
    checkLose();
  }

  if(target.redSlashCooldown<=0&&dist<280){ fireRedSlash(); target.redSlashCooldown=(phase===2?55:90)+Math.floor(Math.random()*30); }
  if(target.blueAuraCooldown<=0&&dist>100){ fireBlueOrb(); target.blueAuraCooldown=(phase===2?70:110)+Math.floor(Math.random()*40); }
  if(target.purpleBeamCooldown<=0&&dist>80&&dist<400){ firePurpleBeam(); target.purpleBeamCooldown=(phase===2?160:220)+Math.floor(Math.random()*60); }
  if(target.energy>=100&&!gojoDomainActive){ gojoDomainActive=true; frozenTimer=phase===2?360:280; target.energy=0; }
  if(!target.phase2announced&&target.hp<=target.maxHp*0.5){ target.phase2announced=true; bossPhase=2; showPhaseBanner(); }
}

function showPhaseBanner(){
  phaseBanner.style.display='block'; phaseBanner.style.opacity='1';
  let t=0; const f=()=>{ t++; if(t>120) phaseBanner.style.opacity=(1-(t-120)/30).toString(); if(t<150) requestAnimationFrame(f); else { phaseBanner.style.display='none'; phaseBanner.style.opacity='1'; } };
  requestAnimationFrame(f);
}

/* ── GOJO YETENEKLERİ ── */
function fireRedSlash(){
  const count=bossPhase===2?4:2;
  for(let i=0;i<count;i++){
    const base2=Math.atan2(player.y-target.y,player.x-target.x);
    const angle=base2+(Math.random()-0.5)*0.8;
    gojoRedSlashes.push({ x:target.x,y:target.y, vx:Math.cos(angle)*(bossPhase===2?9:7), vy:Math.sin(angle)*(bossPhase===2?9:7), life:50,maxLife:50,length:45,angle,hit:false });
  }
  spawnParticles(target.x,target.y,'#ff0040',5);
}
function fireBlueOrb(){
  const angle=Math.atan2(player.y-target.y,player.x-target.x);
  const spd=bossPhase===2?6.5:5;
  gojoBlueAura.push({ x:target.x,y:target.y, vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd, radius:bossPhase===2?18:14, life:80,maxLife:80,hit:false });
}
function firePurpleBeam(){
  gojoPurpleBeam={ x:target.x,y:target.y, tx:player.x,ty:player.y, life:25,maxLife:25, width:bossPhase===2?40:28, angle:Math.atan2(player.y-target.y,player.x-target.x), hit:false };
  spawnParticles(target.x,target.y,'#aa00ff',15);

/* ── JOYSTICK ── */
let joystickTouchId=null;
function handleJoystickMove(cx,cy){
  if(domainActive||frozenTimer>0||gameOver) return;
  const rect=joystickBase.getBoundingClientRect();
  let dx=cx-(rect.left+rect.width/2), dy=cy-(rect.top+rect.height/2);
  const dist=Math.hypot(dx,dy), maxR=rect.width/2-5;
  if(dist>maxR){ dx=(dx/dist)*maxR; dy=(dy/dist)*maxR; }
  stick.style.left=(rect.width/2-17+dx)+'px'; stick.style.top=(rect.height/2-17+dy)+'px';
  player.vx=dx/maxR; player.vy=dy/maxR;
  if(player.vx>0.1) player.facing='right'; if(player.vx<-0.1) player.facing='left';
  if(Math.abs(player.vx)>0.05||Math.abs(player.vy)>0.05){
    const len=Math.hypot(player.vx,player.vy);
    player.lastDirectionX=player.vx/len; player.lastDirectionY=player.vy/len;
    if(!player.isDashing&&player.state!=='hit'&&player.state!=='skill') player.state='walk';
  }
}
function resetJoystick(){
  const rect=joystickBase.getBoundingClientRect();
  stick.style.left=(rect.width/2-17)+'px'; stick.style.top=(rect.height/2-17)+'px';
  player.vx=0; player.vy=0; if(player.state==='walk') player.state='idle';
}
window.addEventListener('touchstart',(e)=>{
  for(let i=0;i<e.changedTouches.length;i++){
    const t=e.changedTouches[i];
    const rect=joystickBase.getBoundingClientRect();
    if(t.clientX>=rect.left&&t.clientX<=rect.right&&t.clientY>=rect.top&&t.clientY<=rect.bottom&&joystickTouchId===null){
      joystickTouchId=t.identifier; handleJoystickMove(t.clientX,t.clientY);
    }
  }
},{passive:false});
window.addEventListener('touchmove',(e)=>{
  if(joystickTouchId===null) return;
  for(let i=0;i<e.touches.length;i++) if(e.touches[i].identifier===joystickTouchId) handleJoystickMove(e.touches[i].clientX,e.touches[i].clientY);
},{passive:true});
window.addEventListener('touchend',(e)=>{
  if(joystickTouchId===null) return;
  for(let i=0;i<e.changedTouches.length;i++) if(e.changedTouches[i].identifier===joystickTouchId){ joystickTouchId=null; resetJoystick(); }
});
let mouseActive=false;
joystickBase.addEventListener('mousedown',(e)=>{ mouseActive=true; handleJoystickMove(e.clientX,e.clientY); });
window.addEventListener('mousemove',(e)=>{ if(mouseActive) handleJoystickMove(e.clientX,e.clientY); });
window.addEventListener('mouseup',()=>{ mouseActive=false; resetJoystick(); });

}

/* ── PROJECTILE HITS ── */
function checkProjectileHits(){
  for(let i=gojoRedSlashes.length-1;i>=0;i--){
    const s=gojoRedSlashes[i]; s.x+=s.vx; s.y+=s.vy; s.life--;
    if(!s.hit&&Math.hypot(s.x-player.x,s.y-player.y)<player.radius+20){
      s.hit=true; const dmg=bossPhase===2?22:15; player.hp-=dmg;
      addFloatingText(player.x,player.y-20,`-${dmg}`,'#ff0040'); spawnParticles(player.x,player.y,'#ff0040',5); checkLose();
    }
    if(s.life<=0) gojoRedSlashes.splice(i,1);
  }
  for(let i=gojoBlueAura.length-1;i>=0;i--){
    const b=gojoBlueAura[i]; b.x+=b.vx; b.y+=b.vy; b.life--;
    if(!b.hit&&Math.hypot(b.x-player.x,b.y-player.y)<player.radius+b.radius){
      b.hit=true; const dmg=bossPhase===2?28:18; player.hp-=dmg;
      const ang=Math.atan2(b.y-player.y,b.x-player.x);
      player.x+=Math.cos(ang)*15; player.y+=Math.sin(ang)*15;
      addFloatingText(player.x,player.y-20,`-${dmg} ÇEKİM`,'#0099ff'); spawnParticles(player.x,player.y,'#0099ff',8); checkLose();
    }
    if(b.life<=0) gojoBlueAura.splice(i,1);
  }
  if(gojoPurpleBeam&&!gojoPurpleBeam.hit&&gojoPurpleBeam.life>0){
    const bx2=gojoPurpleBeam.x,by2=gojoPurpleBeam.y,ang=gojoPurpleBeam.angle;
    const tx=player.x-bx2,ty=player.y-by2;
    const proj=tx*Math.cos(ang)+ty*Math.sin(ang);
    if(proj>0&&proj<600){
      const perp=Math.abs(-tx*Math.sin(ang)+ty*Math.cos(ang));
      if(perp<gojoPurpleBeam.width/2+player.radius){
        gojoPurpleBeam.hit=true; const dmg=bossPhase===2?55:38; player.hp-=dmg;
        addFloatingText(player.x,player.y-30,`⚡ -${dmg}`,'#cc00ff'); spawnParticles(player.x,player.y,'#cc00ff',12); checkLose();
      }
    }
  }
  // Ateş dalgası çarpışma
  if(flameWave){
    for(let i=flameWave.projectiles.length-1;i>=0;i--){
      const fp=flameWave.projectiles[i];
      fp.trail.push({x:fp.x,y:fp.y});
      if(fp.trail.length>12) fp.trail.shift();
      fp.x+=fp.vx; fp.y+=fp.vy; fp.life--;
      if(!fp.hit&&Math.hypot(fp.x-target.x,fp.y-target.y)<target.radius+fp.radius){
        fp.hit=true;
        const dmg=40; // 40 hasar
        target.hp=Math.max(0,target.hp-dmg);
        target.stunTimer=10;
        spawnParticles(target.x,target.y,'#ff6a00',10);
        addFloatingText(target.x,target.y-30,`🔥 -${dmg}`,'#ff6a00');
        player.energy=Math.min(player.maxEnergy,player.energy+15);
        if(player.energy>=100) btnSkill.classList.remove('disabled-btn');
        checkWin();
      }
      if(fp.life<=0) flameWave.projectiles.splice(i,1);
    }
    if(flameWave.projectiles.length===0) flameWave=null;
  }
}

/* ── MAIN LOOP ── */
function loop(currentTime){
  if(gameOver){ animFrame=null; return; }
  const dt=Math.min(currentTime-lastTime,50); lastTime=currentTime;

  updateAI(); checkProjectileHits();

  if(player.dashCooldown>0) player.dashCooldown-=dt;
  if(specialCooldown>0) specialCooldown-=dt;
  if(cleaveCooldown>0) cleaveCooldown--;
  if(flameCooldown>0) flameCooldown--;
  if(comboResetTimer>0) comboResetTimer--; else if(comboCount>0) comboCount=0;

  // BG
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(gojoDomainActive){
    ctx.fillStyle='#040818'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='rgba(0,200,255,0.08)'; ctx.fillRect(0,0,canvas.width,canvas.height);
    frozenTimer--; if(frozenTimer<=0) gojoDomainActive=false;
    ctx.strokeStyle='rgba(0,180,255,0.12)'; ctx.lineWidth=1;
    for(let gx=0;gx<canvas.width;gx+=50){ ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,canvas.height); ctx.stroke(); }
    for(let gy=0;gy<canvas.height;gy+=50){ ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(canvas.width,gy); ctx.stroke(); }
  } else if(domainActive){
    ctx.fillStyle='#09050d'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.strokeStyle='#4e005c'; ctx.lineWidth=28; ctx.strokeRect(0,0,canvas.width,canvas.height);
    ctx.strokeStyle='#8800aa'; ctx.lineWidth=8; ctx.strokeRect(14,14,canvas.width-28,canvas.height-28);
    domainDamageTicker+=dt;
    if(domainDamageTicker>=180){ target.hp=Math.max(0,target.hp-25); addFloatingText(target.x,target.y-30,'-25','#cc44ff'); domainDamageTicker=0; checkWin(); }
  } else {
    ctx.fillStyle='#997951'; ctx.fillRect(0,0,canvas.width,canvas.height);
    arenaObjects.forEach(obj=>{ ctx.fillStyle='#654321'; ctx.beginPath(); ctx.arc(obj.x,obj.y,obj.r,0,Math.PI*2); ctx.fill(); ctx.strokeStyle='#3c2a18'; ctx.lineWidth=2; ctx.stroke(); });
    ctx.strokeStyle='#735738'; ctx.lineWidth=20; ctx.strokeRect(0,0,canvas.width,canvas.height);
  }

  // Hareket
  if(!domainActive&&frozenTimer<=0){
    if(player.isDashing){ player.x+=player.lastDirectionX*player.dashSpeed; player.y+=player.lastDirectionY*player.dashSpeed; player.dashTimer--; if(player.dashTimer<=0){ player.isDashing=false; player.state='idle'; } }
    else { player.x+=player.vx*player.speed; player.y+=player.vy*player.speed; }
  }
  target.x+=target.vx; target.y+=target.vy; target.vx*=target.friction; target.vy*=target.friction;

  [player,target].forEach(obj=>{ obj.x=Math.max(obj.radius+15,Math.min(canvas.width-obj.radius-15,obj.x)); obj.y=Math.max(obj.radius+15,Math.min(canvas.height-obj.radius-15,obj.y)); });

  // Domain cuts
  if(domainActive){ domainTimer--; domainCuts.forEach(cut=>{ if(domainTimer<120-cut.delay){ ctx.save(); ctx.strokeStyle='rgba(255,200,255,0.75)'; ctx.lineWidth=1.5; ctx.translate(cut.x1,cut.y1); ctx.rotate(cut.angle); ctx.beginPath(); ctx.moveTo(-cut.length/2,0); ctx.lineTo(cut.length/2,0); ctx.stroke(); ctx.restore(); } }); }

  // Gojo kırmızı kesikler
  gojoRedSlashes.forEach(s=>{ ctx.save(); ctx.translate(s.x,s.y); ctx.rotate(s.angle); ctx.strokeStyle=`rgba(255,0,64,${s.life/s.maxLife})`; ctx.lineWidth=3; ctx.shadowColor='#ff0040'; ctx.shadowBlur=8; ctx.beginPath(); ctx.moveTo(-s.length/2,0); ctx.lineTo(s.length/2,0); ctx.stroke(); ctx.restore(); });

  // Gojo mavi toplar
  gojoBlueAura.forEach(b=>{ ctx.save(); ctx.globalAlpha=b.life/b.maxLife; ctx.fillStyle='#0099ff'; ctx.shadowColor='#00d4ff'; ctx.shadowBlur=18; ctx.beginPath(); ctx.arc(b.x,b.y,b.radius,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0; ctx.restore(); });

  // Mor ışın
  if(gojoPurpleBeam&&gojoPurpleBeam.life>0){
    gojoPurpleBeam.life--;
    const alpha=gojoPurpleBeam.life/gojoPurpleBeam.maxLife;
    ctx.save(); ctx.translate(gojoPurpleBeam.x,gojoPurpleBeam.y); ctx.rotate(gojoPurpleBeam.angle); ctx.globalAlpha=alpha;
    ctx.strokeStyle='rgba(255,0,255,0.3)'; ctx.lineWidth=gojoPurpleBeam.width*2.5; ctx.lineCap='round'; ctx.shadowColor='#cc00ff'; ctx.shadowBlur=30;
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(600,0); ctx.stroke();
    ctx.strokeStyle='rgba(200,0,255,0.7)'; ctx.lineWidth=gojoPurpleBeam.width; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(600,0); ctx.stroke();
    ctx.strokeStyle='#fff'; ctx.lineWidth=gojoPurpleBeam.width*0.3; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(600,0); ctx.stroke();
    ctx.shadowBlur=0; ctx.restore();
    if(gojoPurpleBeam.life<=0) gojoPurpleBeam=null;
  }

  // Ateş dalgası çiz
  if(flameWave){ flameWave.projectiles.forEach(fp=>{ // İz
    fp.trail.forEach((pt,idx)=>{ const a=(idx/fp.trail.length)*0.5; ctx.save(); ctx.globalAlpha=a; ctx.fillStyle='#ff4400'; ctx.beginPath(); ctx.arc(pt.x,pt.y,(idx/fp.trail.length)*fp.radius,0,Math.PI*2); ctx.fill(); ctx.restore(); });
    ctx.save(); ctx.globalAlpha=fp.life/fp.maxLife; ctx.fillStyle='#ff8800'; ctx.shadowColor='#ff4400'; ctx.shadowBlur=16; ctx.beginPath(); ctx.arc(fp.x,fp.y,fp.radius,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#ffcc00'; ctx.beginPath(); ctx.arc(fp.x,fp.y,fp.radius*0.5,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0; ctx.restore();
  }); }

  // Cleave efekti
  if(cleaveEffect&&cleaveEffect.life>0){
    cleaveEffect.life--;
    const alpha=cleaveEffect.life/cleaveEffect.maxLife;
    ctx.save(); ctx.translate(cleaveEffect.x,cleaveEffect.y); ctx.rotate(cleaveEffect.angle); ctx.globalAlpha=alpha;
    ctx.strokeStyle='#cc00ff'; ctx.lineWidth=4; ctx.shadowColor='#cc00ff'; ctx.shadowBlur=20;
    ctx.beginPath(); ctx.arc(0,0,cleaveEffect.radius,-cleaveEffect.spread/2,cleaveEffect.spread/2); ctx.stroke();
    ctx.strokeStyle='rgba(255,200,255,0.8)'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(0,0,cleaveEffect.radius*0.7,-cleaveEffect.spread/2,cleaveEffect.spread/2); ctx.stroke();
    ctx.shadowBlur=0; ctx.restore();
    if(cleaveEffect.life<=0) cleaveEffect=null;
  }

  // Partiküller
  for(let i=particles.length-1;i>=0;i--){ const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.life--; ctx.globalAlpha=p.life/p.maxLife; ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2); ctx.fill(); if(p.life<=0) particles.splice(i,1); }
  ctx.globalAlpha=1;

  drawGojo(target); drawSukuna(player);

  // Floating texts
  ctx.font='bold 16px sans-serif';
  for(let i=floatingTexts.length-1;i>=0;i--){ const ft=floatingTexts[i]; ft.y+=ft.vy; ft.life--; ctx.globalAlpha=Math.min(1,ft.life/20); ctx.fillStyle=ft.color; ctx.fillText(ft.text,ft.x,ft.y); if(ft.life<=0) floatingTexts.splice(i,1); }
  ctx.globalAlpha=1;

  drawInterface();

  if(gojoDomainActive){
    ctx.font='bold 22px sans-serif'; ctx.fillStyle='rgba(0,200,255,0.85)';
    ctx.fillText('⚠ GOJO ALANI AKTİF ⚠',canvas.width/2-120,canvas.height/2);
    ctx.font='14px sans-serif'; ctx.fillStyle='rgba(180,220,255,0.7)';
    ctx.fillText('Donmuş...',canvas.width/2-35,canvas.height/2+26);
  }

  if(player.hp<=0){ checkLose(); return; }
  animFrame=requestAnimationFrame(loop);
}

})();
</script>
</body>
</html>
